<!DOCTYPE html>
<html>
<head>
  <title>NOC Tracking - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h2>NOC Application Tracking Dashboard</h2>
  <button onclick="logout()">Logout</button>
</header>

<section class="summary">
  <div class="card">Total: <span id="total">0</span></div>
  <div class="card">Pending: <span id="pending">0</span></div>
  <div class="card">Approved: <span id="approved">0</span></div>
  <div class="card">Rejected: <span id="rejected">0</span></div>
</section>

<section class="filters">
  <select id="circleFilter">
    <option value="">All Circles</option>
    <option>Circle 1</option>
    <option>Circle 2</option>
    <option>Circle 3</option>
    <option>Circle 4</option>
    <option>Circle 5</option>
  </select>

  <select id="statusFilter">
    <option value="">All Status</option>
    <option>Approved</option>
    <option>Rejected</option>
    <option>Pending</option>
  </select>

  <select id="agingFilter">
    <option value="">All</option>
    <option value="15">Pending > 15 Days</option>
    <option value="30">Pending > 30 Days</option>
  </select>

  <button onclick="loadApplications()">Apply Filter</button>
  <button onclick="window.print()">Print</button>
</section>

<table id="nocTable">
  <thead>
    <tr>
      <th>Application ID</th>
      <th>Circle</th>
      <th>Current Status</th>
      <th>Status Date</th>
      <th>Days Pending</th>
      <th>Final Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="js/dashboard.js"></script>
</body>
</html>
